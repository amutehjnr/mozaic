services:
  - type: web
    name: mozaic-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: FLW_PUBLIC_KEY
        sync: false
      - key: FLW_SECRET_KEY
        sync: false
      - key: FLW_WEBHOOK_SECRET
        sync: false          # <── ADD THIS in Render dashboard
      - key: FLW_ENCRYPTION_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: BASE_URL
        value: https://mozaic-eomm.onrender.com